version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quantlib-postgres
    environment:
      POSTGRES_DB: quantlib
      POSTGRES_USER: quantlib_user
      POSTGRES_PASSWORD: quantlib_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/conf/evolutions/default:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantlib_user -d quantlib"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantlib-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantlib-backend
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/quantlib
      - DATABASE_USER=quantlib_user
      - DATABASE_PASSWORD=quantlib_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - PLAY_HTTP_SECRET_KEY=${PLAY_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sbt run

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantlib-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:9000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
