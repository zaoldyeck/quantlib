# pytest 設定放在 **repo 根**,不放 research/pyproject.toml。
# 理由:所有指令一律從 repo 根執行(見 CLAUDE.md「Run Python research from repo
# root」),而 pytest 只會往 cwd 的**父層**找設定——放在子目錄 research/ 裡
# 永遠讀不到,設定看起來存在、實際從未生效(2026-07-22 實測踩到)。
[pytest]
testpaths = src/quantlib
python_files = test_*.py

# 測試一律與被測程式碼同居(per-package `tests/`)。2026-07-22 結構重整前是
# 「中央 research/tests/ 24 支 + per-package 13 支 + 散落 2 支」三分天下,
# 還出現兩支同名不同物的 test_engine.py——找測試要猜、跑測試要記,兩者都不該。
#
# importlib 模式:允許多個同名的 `tests` 套件並存(每個子系統一個);
# 傳統 prepend 模式會因為模組名撞車而整批收集失敗。
addopts = --import-mode=importlib

# 產物與凍結的歷史復原碼不收集(前者無測試,後者是逐字封存的實驗紀錄)
norecursedirs = .venv var data legacy src/quantlib/apex/rebuild src/quantlib/apex/experiments
