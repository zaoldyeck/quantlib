      }
      afterIFRSs = "https://mopsov.twse.com.tw/mops/web/ajax_t163sb04"
    }
    file = "https://mopsov.twse.com.tw/server-java/t105sb02"
    dir = {
      twse = ${data.dir}"/income_statement/twse"
      tpex = ${data.dir}"/income_statement/tpex"
    }
  }
  financial_statements = {
    file = {
      beforeIFRSs = {
        individual = "https://mopsov.twse.com.tw/server-java/t147sb02?t203sb01Form=t203sb01Form&step=0&R_TYPE1=A&YEAR1="
        consolidated = "https://mopsov.twse.com.tw/server-java/t147sb02?t203sb01Form=t203sb01Form&step=0&R_TYPE1=B&YEAR1="
      }
      afterIFRSs = {
        individual = "https://mopsov.twse.com.tw/server-java/t164sb01?t203sb01Form=t203sb01Form&step=1&REPORT_ID=A&SYEAR="
        consolidated = "https://mopsov.twse.com.tw/server-java/t164sb01?t203sb01Form=t203sb01Form&step=1&REPORT_ID=C&SYEAR="
        bulkInstanceDocuments = "https://mopsov.twse.com.tw/server-java/FileDownLoad?step=9&filePath=/home/html/nas/ifrs/"
      }
    }
    dir = ${data.dir}"/financial_statements"
  }
  exRightDividend = {
    // MOPS t108sb27 two-step: (1) POST to page → HTML with filename hidden field;
    // (2) POST to file endpoint with that filename → CSV body. Monthly granularity.
    // TWSE's legacy TWT49U and TPEx's exDailyQ_result.php both stopped returning
    // data in mid-2024, silently filling disk with 2-byte empty files.
    page = "https://mopsov.twse.com.tw/mops/web/ajax_t108sb27"
    file = "https://mopsov.twse.com.tw/server-java/t105sb02"
    twse = {
      dir = ${data.dir}"/ex_right_dividend/twse"
    }
    tpex = {
      dir = ${data.dir}"/ex_right_dividend/tpex"
    }
  }
  capitalReduction = {
    twse = {
      file = "https://www.twse.com.tw/exchangeReport/TWTAUU?response=csv&strDate="
      dir = ${data.dir}"/capital_reduction/twse"
    }
    tpex = {
      file = "https://www.tpex.org.tw/www/zh-tw/bulletin/revivt?response=csv&startDate="
      dir = ${data.dir}"/capital_reduction/tpex"
    }
  }
  dailyQuote = {
    twse = {
      file = "https://www.twse.com.tw/rwd/zh/afterTrading/MI_INDEX?response=csv&type=ALLBUT0999&date="
      dir = ${data.dir}"/daily_quote/twse"
    }
    tpex = {
