  }
  index = {
    twse = {
      file = "https://www.twse.com.tw/rwd/zh/afterTrading/MI_INDEX?response=csv&type=IND&date="
      dir = ${data.dir}"/index/twse"
    }
    tpex = {
      file = "https://www.tpex.org.tw/www/zh-tw/afterTrading/indexSummary?response=csv&date="
      dir = ${data.dir}"/index/tpex"
    }
  }
  marginTransactions = {
    twse = {
      file = "https://www.twse.com.tw/rwd/zh/marginTrading/MI_MARGN?response=csv&selectType=ALL&date="
      dir = ${data.dir}"/margin_transactions/twse"
    }
    tpex = {
      file = "https://www.tpex.org.tw/web/stock/margin_trading/margin_balance/margin_bal_result.php?l=zh-tw&o=csv&d="
      dir = ${data.dir}"/margin_transactions/tpex"
    }
  }
  // TDCC 集保戶股權分散表 — endpoint has no date parameter, always returns latest week.
  // Historical backfill (2008+) must come from mirrors (Task #20).
  tdcc = {
    file = "https://opendata.tdcc.com.tw/getOD.ashx?id=1-5"
    dir = ${data.dir}"/tdcc_shareholding/weekly"
  }
  // 借券賣出餘額（機構結構性空頭）
  // TWSE returns CSV (Big5), TPEx returns JSON (UTF-8). Reader detects format by first byte.
  sbl = {
    twse = {
      file = "https://www.twse.com.tw/exchangeReport/TWT93U?response=csv&date="
      dir = ${data.dir}"/sbl_borrowing/twse"
    }
    tpex = {
      // TpexDetail already formats date as 民國 y/MM/dd; this endpoint expects exactly that.
      file = "https://www.tpex.org.tw/www/zh-tw/margin/sbl?date="
      dir = ${data.dir}"/sbl_borrowing/tpex"
    }
  }
  // 外資及陸資持股比率（snapshot ratio，非 daily flow）
  // TWSE MI_QFIIS returns CSV (Big5, 2005+), TPEx insti/qfii returns JSON (UTF-8, 2010+).
  foreignHoldingRatio = {
    twse = {
      file = "https://www.twse.com.tw/rwd/zh/fund/MI_QFIIS?response=csv&selectType=ALLBUT0999&date="
      dir = ${data.dir}"/foreign_holding_ratio/twse"
    }
    tpex = {
      file = "https://www.tpex.org.tw/www/zh-tw/insti/qfii?date="
      dir = ${data.dir}"/foreign_holding_ratio/tpex"
    }
  }
  dailyTradingDetails = {
