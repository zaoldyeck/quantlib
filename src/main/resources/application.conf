play.ws.ssl.loose.acceptAnyCertificate = true
data = {
  dir = "./data"
  financialAnalysis = {
    page = "https://mopsov.twse.com.tw/mops/web/ajax_t51sb02"
    file = "https://mopsov.twse.com.tw/server-java/t105sb02"
    dir = {
      twse = ${data.dir}"/financial_analysis/twse"
      tpex = ${data.dir}"/financial_analysis/tpex"
    }
  }
  operatingRevenue = {
    page = "https://mopsov.twse.com.tw/mops/web/ajax_t21sb06"
    file = {
      beforeIFRSs = {
        individual = {
          twse = "https://mopsov.twse.com.tw/nas/t21/sii/t21sc03_"
          tpex = "https://mopsov.twse.com.tw/nas/t21/otc/t21sc03_"
