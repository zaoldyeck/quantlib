db = {
  connectionPool = "HikariCP"
  dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
  properties = {
    serverName = "localhost"
    portNumber = "5432"
    databaseName = "quantlib"
  }
  // Slick's thread pool size — should match HikariCP maxConnections to avoid deadlock.
  // Default was 20 per pool × 4 Reader instances = 80 connections, near PG max_connections=100.
  numThreads = 4
  maxConnections = 4
  minConnections = 1
}

